<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">mcp-local-relay topology</title>
  <desc id="desc">Codex, Claude Code, and Antigravity connect to one local MCP relay, which keeps upstream MCP servers warm.</desc>
  <defs>
    <linearGradient id="relay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f9d8a"/>
      <stop offset="100%" stop-color="#265bff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#182233" flood-opacity=".18"/>
    </filter>
    <style>
      .bg { fill: #f7f9fb; }
      .panel { fill: #ffffff; stroke: #d9e2ec; stroke-width: 1.5; filter: url(#shadow); }
      .client { fill: #ffffff; stroke: #8da2b8; stroke-width: 1.5; }
      .upstream { fill: #f3f7f5; stroke: #86a99b; stroke-width: 1.5; }
      .relay { fill: url(#relay); }
      .title { font: 700 24px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .label { font: 650 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .small { font: 500 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #506176; }
      .relayText { font: 750 19px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .line { fill: none; stroke: #9aaabd; stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 7 9; }
      .flow { fill: #265bff; opacity: .9; }
      .warm { fill: #1f9d8a; opacity: .9; }
    </style>
  </defs>
  <rect class="bg" width="960" height="420" rx="0"/>
  <rect class="panel" x="42" y="44" width="876" height="332" rx="8"/>

  <text class="title" x="84" y="94">One local MCP endpoint for every agent session</text>
  <text class="small" x="84" y="121">Clients connect once to localhost. The relay keeps upstream MCPs warm, cached, and shared.</text>

  <g transform="translate(86 165)">
    <rect class="client" width="162" height="54" rx="8"/>
    <text class="label" x="24" y="34">Codex</text>
  </g>
  <g transform="translate(86 238)">
    <rect class="client" width="162" height="54" rx="8"/>
    <text class="label" x="24" y="34">Claude Code</text>
  </g>
  <g transform="translate(86 311)">
    <rect class="client" width="162" height="54" rx="8"/>
    <text class="label" x="24" y="34">Antigravity</text>
  </g>

  <g transform="translate(390 204)">
    <rect class="relay" width="190" height="118" rx="8"/>
    <text class="relayText" x="27" y="49">mcp-local-relay</text>
    <text class="small" x="37" y="78" fill="#ffffff" opacity=".9">127.0.0.1:3764</text>
  </g>

  <g transform="translate(708 143)">
    <rect class="upstream" width="160" height="52" rx="8"/>
    <text class="label" x="23" y="32">PostHog MCP</text>
  </g>
  <g transform="translate(708 222)">
    <rect class="upstream" width="160" height="52" rx="8"/>
    <text class="label" x="23" y="32">Docs MCP</text>
  </g>
  <g transform="translate(708 301)">
    <rect class="upstream" width="160" height="52" rx="8"/>
    <text class="label" x="23" y="32">Search MCP</text>
  </g>

  <path class="line" d="M248 192 C300 192 320 230 390 242"/>
  <path class="line" d="M248 265 C302 265 330 263 390 263"/>
  <path class="line" d="M248 338 C300 338 320 296 390 284"/>
  <path class="line" d="M580 242 C628 214 658 174 708 169"/>
  <path class="line" d="M580 263 C624 253 656 248 708 248"/>
  <path class="line" d="M580 284 C628 313 658 327 708 327"/>

  <circle class="flow" r="6">
    <animateMotion dur="3.6s" repeatCount="indefinite" path="M248 192 C300 192 320 230 390 242"/>
  </circle>
  <circle class="flow" r="6">
    <animateMotion dur="3.6s" begin=".4s" repeatCount="indefinite" path="M248 265 C302 265 330 263 390 263"/>
  </circle>
  <circle class="flow" r="6">
    <animateMotion dur="3.6s" begin=".8s" repeatCount="indefinite" path="M248 338 C300 338 320 296 390 284"/>
  </circle>
  <circle class="warm" r="6">
    <animateMotion dur="3.2s" begin=".2s" repeatCount="indefinite" path="M580 242 C628 214 658 174 708 169"/>
  </circle>
  <circle class="warm" r="6">
    <animateMotion dur="3.2s" begin=".6s" repeatCount="indefinite" path="M580 263 C624 253 656 248 708 248"/>
  </circle>
  <circle class="warm" r="6">
    <animateMotion dur="3.2s" begin="1s" repeatCount="indefinite" path="M580 284 C628 313 658 327 708 327"/>
  </circle>

  <text class="small" x="112" y="153">Any number of local agent sessions</text>
  <text class="small" x="707" y="128">Shared upstream MCP servers</text>
</svg>
